workflows:
  ios_testflight_windows:
    name: LinguFranca iOS TestFlight (Mobile Repo)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.lingufranca.app
      groups:
        - app_store_credentials

    scripts:
      - name: Flutter packages
        script: |
          flutter pub get

      - name: CocoaPods install
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up iOS code signing
        script: |
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "ERROR: CERTIFICATE_PRIVATE_KEY is empty."
            echo "Create an RSA 2048 private key and save it as a secret env var named CERTIFICATE_PRIVATE_KEY."
            exit 1
          fi
          if ! echo "$CERTIFICATE_PRIVATE_KEY" | grep -q "BEGIN RSA PRIVATE KEY"; then
            echo "ERROR: CERTIFICATE_PRIVATE_KEY must be RSA 2048 PEM."
            echo "Expected header: -----BEGIN RSA PRIVATE KEY-----"
            echo "Do not use APP_STORE_CONNECT .p8 key here."
            exit 1
          fi

          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY"
          keychain add-certificates

      - name: Build IPA
        script: |
          BUILD_NO="${BUILD_NUMBER:-1}"
          flutter build ios \
            --release \
            --no-codesign \
            --build-number="$BUILD_NO"
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "ios/Runner.xcworkspace" \
            --scheme "Runner"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
